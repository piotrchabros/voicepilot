<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'none'" />
    <title>copilot overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <!--
      The core UI: one hint text node (Big. Bottom-centre. Dim for RETRIEVED,
      bright for GENERATED) plus a small health banner pill (top, red, shown
      only on ok:false — sidecar exit / device loss / Soniox disconnect;
      spec.md Task 2.4). No framework — a framework here is pure overhead.
    -->
    <div id="health-pill"><span id="health"></span></div>
    <div id="pill"><span id="hint"></span></div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
