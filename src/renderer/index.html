<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'none'" />
    <title>copilot overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <!--
      The core UI: one suggestion card (Big. Bottom-centre. Dim for
      RETRIEVED, bright for GENERATED) plus a small health banner pill (top,
      red, shown only on ok:false — sidecar exit / device loss / Soniox
      disconnect; spec.md Task 2.4). No framework — a framework here is pure
      overhead.

      RETRIEVED suggestions carry a headline + one detail line (spec.md §5
      "headline ≤6 words + one line"); GENERATED renders as a single line.
      hint-view.ts's hintDisplayFor decides which, overlay.ts only paints it.

      Top-left transport chrome (spec.md §5 "mode selector" / Plans.md Task
      4.1's REC indicator): an always-visible mode chip (which capture
      transport is live) alongside the Transport-B recording indicator, which
      only appears once the operator affirms consent.

      Transport-B consent chrome (spec.md §4 item 2 / §5, Plans.md Task 4.1):
      a consent prompt (announcement script + affirm button) shown until the
      operator affirms, then the persistent REC indicator above for the rest
      of the call. The window is click-through except while the prompt is
      visible (main toggles setIgnoreMouseEvents around this).
    -->
    <div id="health-pill"><span id="health"></span></div>
    <div id="consent-prompt">
      <span id="consent-announcement"></span>
      <button id="consent-affirm-btn" type="button">I have obtained / will announce consent</button>
    </div>
    <div id="top-left-chrome">
      <div id="mode-chip"><span id="mode-label"></span></div>
      <div id="rec-indicator"><span id="rec-dot"></span><span id="rec-label">REC</span></div>
    </div>
    <div id="pill">
      <span id="hint-headline"></span>
      <span id="hint-line"></span>
    </div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
